<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KINETIC | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&amp;family=Manrope:wght@400;500;600&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed-variant": "#625400",
              "on-surface": "#ffffff",
              "surface-variant": "#262626",
              "on-primary-fixed": "#3b4a00",
              "error-dim": "#d53d18",
              "outline": "#767575",
              "tertiary-dim": "#e5c930",
              "on-tertiary-fixed": "#423800",
              "on-primary-fixed-variant": "#546900",
              "surface-bright": "#2c2c2c",
              "on-surface-variant": "#adaaaa",
              "secondary-dim": "#ff7441",
              "inverse-primary": "#526700",
              "surface-tint": "#f4ffc9",
              "inverse-on-surface": "#565555",
              "primary-fixed-dim": "#c1ed00",
              "error-container": "#b92902",
              "tertiary": "#ffe56b",
              "surface-dim": "#0e0e0e",
              "surface-container": "#1a1a1a",
              "secondary-fixed": "#ffc4b1",
              "outline-variant": "#484847",
              "background": "#0e0e0e",
              "on-background": "#ffffff",
              "surface": "#0e0e0e",
              "on-secondary": "#410f00",
              "inverse-surface": "#fcf9f8",
              "surface-container-highest": "#262626",
              "tertiary-container": "#f4d73e",
              "on-error": "#450900",
              "surface-container-lowest": "#000000",
              "primary-container": "#cefc22",
              "primary-dim": "#c1ed00",
              "primary": "#f4ffc9",
              "on-secondary-fixed-variant": "#932d00",
              "secondary": "#ff7441",
              "on-primary-container": "#4b5e00",
              "on-error-container": "#ffd2c8",
              "on-secondary-container": "#fff6f3",
              "surface-container-low": "#131313",
              "error": "#ff7351",
              "on-secondary-fixed": "#631b00",
              "tertiary-fixed-dim": "#e5c930",
              "on-tertiary": "#615300",
              "on-tertiary-container": "#574a00",
              "secondary-container": "#ab3600",
              "surface-container-high": "#20201f",
              "primary-fixed": "#cefc22",
              "secondary-fixed-dim": "#ffb197",
              "tertiary-fixed": "#f4d73e",
              "on-primary": "#526700"
            },
            fontFamily: {
              "headline": ["Lexend"],
              "body": ["Manrope"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #131313 0%, #000000 100%);
        }
        .asymmetric-border {
            clip-path: polygon(0 0, 100% 0, 100% 95%, 0 100%);
        }
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- Auth Shell Suppression: Navigation elements from JSON are hidden due to Transactional Nature -->
<main class="min-h-screen grid grid-cols-1 lg:grid-cols-12">
<!-- Left Column: Branding & Dynamic Movement -->
<section class="hidden lg:flex lg:col-span-7 relative kinetic-gradient items-center justify-center overflow-hidden border-r border-outline-variant/10">
<!-- Background Image with Athletic Intensity -->
<div class="absolute inset-0 z-0 opacity-40">
<img alt="Close up of weightlifting plates" class="w-full h-full object-cover" data-alt="Monochrome close up of heavy gym equipment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgfFR5qBzBDOeQBgZFMyzqhJAFrtL9B_sgyPDWVQz32fzl-b-9DQHpHPAKBd52qW9RDLi9kmoEbV3bwaDj0b7PrpCmyry6kHgV46wxCKvPo1T2ICZ_Nc7-GPOsUztSez-VrPjyt9xd6ZkPyFi0ynntQb6b0MzFBCJeHZB56tWB8aF5r0Qsz0RkpetxQ3s53_9jjOXFv_mY0KLpGYnEGikAl8It6OKaj--2vK1DWtycxU_pQIEQl3CUfSlWnziYiscHGV6tIFWBebs"/>
</div>
<!-- Dynamic Overlay Shapes -->
<div class="absolute inset-0 z-10 bg-gradient-to-tr from-background via-transparent to-transparent opacity-80"></div>
<div class="relative z-20 px-12 max-w-2xl">
<h1 class="font-headline text-8xl font-black italic text-primary-container tracking-tighter leading-none mb-4 uppercase">
                    KINETIC
                </h1>
<div class="w-24 h-2 bg-secondary mb-8"></div>
<p class="font-headline text-4xl font-bold text-on-surface uppercase tracking-tight leading-tight mb-6">
                    Elite Performance <br/> Management <span class="text-secondary">Engineered.</span>
</p>
<div class="flex gap-4 mt-12">
<div class="flex flex-col">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Uptime</span>
<span class="font-label text-2xl font-bold text-primary">99.9%</span>
</div>
<div class="w-px h-12 bg-outline-variant/30 self-center mx-4"></div>
<div class="flex flex-col">
<span class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Latency</span>
<span class="font-label text-2xl font-bold text-primary">14ms</span>
</div>
</div>
</div>
<!-- Absolute positioned corner detail -->
<div class="absolute bottom-0 left-0 p-8">
<span class="font-label text-[10px] text-outline-variant uppercase tracking-[0.5em] vertical-rl rotate-180">IRON PULSE DIGITAL ECOSYSTEM</span>
</div>
</section>
<!-- Right Column: Login Form -->
<section class="col-span-1 lg:col-span-5 flex items-center justify-center p-6 md:p-12 lg:p-16 bg-surface">
<div class="w-full max-w-md">
<!-- Mobile Branding -->
<div class="lg:hidden mb-12">
<h1 class="font-headline text-4xl font-black italic text-primary-container tracking-tighter uppercase">
                        KINETIC
                    </h1>
</div>
<div class="mb-10">
<h2 class="font-headline text-3xl font-bold text-on-surface uppercase tracking-tight">System Login</h2>
<p class="text-on-surface-variant mt-2 font-body">Enter your credentials to access the command center.</p>
</div>
<form class="space-y-6">
<!-- Input Group: Email -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest block" for="email">Owner ID / Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="person">person</span>
</div>
<input class="block w-full bg-surface-container-highest border-none text-on-surface py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary-container/50 placeholder:text-outline-variant font-body rounded-sm transition-all" id="email" name="email" placeholder="name@ironpulse.gym" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest" for="password">Access Key</label>
<a class="font-label text-[10px] text-primary hover:text-white transition-colors uppercase tracking-widest" href="#">Forgot Key?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full bg-surface-container-highest border-none text-on-surface py-4 pl-12 pr-12 focus:ring-1 focus:ring-primary-container/50 placeholder:text-outline-variant font-body rounded-sm transition-all" id="password" name="password" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center space-x-3 pt-2">
<div class="relative flex items-center h-5">
<input class="h-4 w-4 rounded-none border-outline-variant bg-surface-container text-primary-container focus:ring-offset-background focus:ring-primary" id="remember" name="remember" type="checkbox"/>
</div>
<label class="font-label text-xs text-on-surface-variant uppercase tracking-widest cursor-pointer select-none" for="remember">Remember this terminal</label>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-headline font-black uppercase tracking-widest py-5 rounded-sm flex items-center justify-center gap-3 active:scale-[0.98] transition-all hover:bg-primary" type="submit">
                            Authorize Access
                            <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Support -->
<div class="mt-12 pt-8 border-t border-outline-variant/10 flex flex-col sm:flex-row justify-between items-center gap-4">
<p class="text-[10px] font-label text-outline-variant uppercase tracking-widest">© 2024 IRON PULSE NETWORKS</p>
<div class="flex gap-6">
<a class="text-[10px] font-label text-on-surface-variant hover:text-primary uppercase tracking-widest transition-colors" href="#">Support</a>
<a class="text-[10px] font-label text-on-surface-variant hover:text-primary uppercase tracking-widest transition-colors" href="#">Privacy</a>
</div>
</div>
</div>
</section>
</main>
<!-- Ambient Glow Decoration (Asymmetric Detail) -->
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary/10 blur-[100px] rounded-full pointer-events-none"></div>
<div class="fixed -top-24 -left-24 w-64 h-64 bg-secondary/5 blur-[80px] rounded-full pointer-events-none"></div>
</body></html>
